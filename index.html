<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hub de Links - Poli">
    <title>Poli | Hub de Links</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7GZEWB676K"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-7GZEWB676K');
    </script>

    <style>
        .admin-access {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
        }

        .admin-access-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            font-family: 'Poppins', sans-serif;
        }

        .admin-access-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
    </style>
</head>
<body style="background-image: url('assets/promo-banner.jpg');">

    <!-- OVERLAY ESCURO SOBRE A IMAGEM -->
    <div class="overlay"></div>

    <!-- CONTAINER COM TUDO FLUTUANDO -->
    <div class="floating-container">
        <!-- HERO CONTENT (PERFIL + TEXTO) -->
        <div class="hero-content">
            <!-- CÍRCULO COM FOTO -->
            <div class="profile-badge">
                <img src="assets/profile.jpg" alt="Poli" class="profile-badge-img">
            </div>

            <h1 class="hero-name">Poli</h1>
            <p class="hero-title">Criadora de conteúdo | Lifestyle</p>
            <p class="hero-bio">24 anos, mineirinha e amo viajar!<br>Faço aqueles vídeos pra gente grande 🍑</p>
            <p class="hero-cta">Quer conversar comigo agora ou me chamar pra jantar?</p>
        </div>

        <!-- LINKS FLUTUANDO -->
        <div class="links-wrapper" id="links-wrapper">
            <!-- Links serão carregados dinamicamente via JavaScript -->
        </div>
    </div>

    <!-- BOTÃO DE ACESSO ADMIN -->
    <div class="admin-access">
        <button class="admin-access-btn" onclick="window.location.href='index-admin.html'">
            🛠️ Modo Admin
        </button>
    </div>

    <!-- TRACKING -->
    <script src="js/track.js"></script>
    <script>
        // Carregar links do JSON e renderizar
        async function loadLinks() {
            try {
                const response = await fetch('links.json');
                const links = await response.json();
                const linksWrapper = document.getElementById('links-wrapper');

                links.forEach(function(link) {
                    // Pular links desativados
                    if (!link.active) {
                        return;
                    }

                    const typeClass = link.type === 'premium' ? 'premium' : link.type === 'social' ? 'social' : '';

                    const linkElement = document.createElement('a');
                    linkElement.href = link.url;
                    linkElement.target = '_blank';
                    linkElement.className = 'link-item ' + typeClass;
                    linkElement.innerHTML = `
                        <div class="link-avatar">
                            <span>${link.emoji}</span>
                        </div>
                        <div class="link-content">
                            <h3>${link.name}</h3>
                            <p>${link.description}</p>
                        </div>
                        <div class="link-arrow">›</div>
                    `;

                    // Adicionar evento de rastreamento
                    linkElement.addEventListener('click', function(e) {
                        var title = this.querySelector('h3').textContent;
                        var description = this.querySelector('p').textContent;
                        var linkType = this.classList.contains('premium') ? 'premium' : this.classList.contains('social') ? 'social' : 'free';
                        Tracking.track(title, linkType, description);
                    });

                    linksWrapper.appendChild(linkElement);
                });
            } catch(error) {
                console.error('Erro ao carregar links:', error);
            }
        }

        // Carregar links quando o DOM estiver pronto
        document.addEventListener('DOMContentLoaded', loadLinks);
    </script>
</body>
</html>
